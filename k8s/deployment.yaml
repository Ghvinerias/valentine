apiVersion: apps/v1
kind: Deployment
metadata:
  name: valentine
  namespace: valentine
  labels:
    app: valentine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: valentine
  template:
    metadata:
      labels:
        app: valentine
    spec:
      containers:
      - name: valentine
        image: slickg/valentine:8bda4ff
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
