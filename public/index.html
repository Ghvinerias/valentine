<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my Valentine?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }

        h1 {
            color: #ff6b9d;
            font-size: 2.5em;
            margin-bottom: 30px;
        }

        .buttons {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            min-height: 60px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .yes-btn {
            background-color: #4CAF50;
            color: white;
        }

        .yes-btn:hover {
            background-color: #45a049;
            transform: scale(1.1);
        }

        .no-btn {
            background-color: #f44336;
            color: white;
            position: absolute;
            left: 50%;
            transform: translateX(50%);
        }

        .no-btn:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💖 Will you be my Valentine? 💖</h1>
        <div class="buttons">
            <button class="yes-btn" onclick="handleYes()">Yes! 😍</button>
            <button class="no-btn" id="noBtn">No 😢</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        // Handle mouse movement near the No button
        document.addEventListener('mousemove', (e) => {
            const btnRect = noBtn.getBoundingClientRect();
            const btnCenterX = btnRect.left + btnRect.width / 2;
            const btnCenterY = btnRect.top + btnRect.height / 2;
            
            const distanceX = e.clientX - btnCenterX;
            const distanceY = e.clientY - btnCenterY;
            const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
            
            // If mouse is within 100px of the button, move it away
            if (distance < 100) {
                const maxX = window.innerWidth - btnRect.width - 50;
                const maxY = window.innerHeight - btnRect.height - 50;
                
                let newX = Math.random() * maxX;
                let newY = Math.random() * maxY;
                
                noBtn.style.position = 'fixed';
                noBtn.style.left = newX + 'px';
                noBtn.style.top = newY + 'px';
                noBtn.style.transform = 'none';
            }
        });

        // Handle click on No button
        noBtn.addEventListener('click', () => {
            window.location.href = '/page2';
        });

        function handleYes() {
            alert('Yay! 💖 I knew you would say yes! 💖');
        }
    </script>
</body>
</html>
